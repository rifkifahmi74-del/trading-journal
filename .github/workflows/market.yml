name: Update market data

# Refreshes market-cache.js daily in the cloud (no PC needed) and on manual run.
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min (keeps Macro Desk regime + feed fresh)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data
        shell: pwsh
        run: ./update-market-data.ps1

      - name: Commit refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market-cache.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update market cache ($(date -u +%Y-%m-%d))"
            git push
          fi
